name: smart_home
description: "Smart Home IoT Monitor — Flutter mobile labs project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  mqtt_client: ^10.11.11
  connectivity_plus: ^7.1.1
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.5+1
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  torch_control:
    path: ../torch_control

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
